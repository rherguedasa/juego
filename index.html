<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Juego de globos</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #87ceeb, #e0f7ff);
      height: 100vh;
      position: relative;
    }

    h1 {
      position: absolute;
      top: 15px;
      width: 100%;
      text-align: center;
      color: #ffffff;
      text-shadow: 1px 1px 4px rgba(0,0,0,0.4);
      z-index: 10;
      margin: 0;
      font-size: 28px;
    }

    #gameArea {
      width: 100%;
      height: 100vh;
      position: relative;
      overflow: hidden;
    }

    .balloon {
      width: 70px;
      height: 90px;
      border-radius: 50%;
      position: absolute;
      bottom: -120px;
      cursor: pointer;
      animation: floatUp linear forwards;
      box-shadow: inset -8px -10px 15px rgba(0,0,0,0.15);
    }

    .balloon::after {
      content: "";
      position: absolute;
      width: 2px;
      height: 40px;
      background: #666;
      left: 50%;
      bottom: -40px;
      transform: translateX(-50%);
    }

    @keyframes floatUp {
      from {
        transform: translateY(0);
      }
      to {
        transform: translateY(-120vh);
      }
    }

    #overlay {
      position: absolute;
      inset: 0;
      display: none;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      background: rgba(0, 0, 0, 0.65);
      z-index: 100;
      padding: 20px;
      text-align: center;
      overflow: hidden;
    }

    #overlay img {
      max-width: 320px;
      max-height: 420px;
      border-radius: 18px;
      border: 5px solid white;
      box-shadow: 0 8px 30px rgba(0,0,0,0.35);
      margin-bottom: 20px;
      position: relative;
      z-index: 2;
    }

    #overlayMessage {
      color: white;
      font-size: 38px;
      font-weight: bold;
      text-shadow: 2px 2px 8px rgba(0,0,0,0.5);
      margin-bottom: 10px;
      position: relative;
      z-index: 2;
    }

    #overlaySubMessage {
      color: #fff7c2;
      font-size: 28px;
      font-weight: bold;
      text-shadow: 2px 2px 8px rgba(0,0,0,0.5);
      margin-bottom: 12px;
      position: relative;
      z-index: 2;
    }

    #closeBtn {
      margin-top: 18px;
      padding: 10px 18px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: white;
      color: #333;
      font-weight: bold;
      position: relative;
      z-index: 2;
    }

    #counter {
      position: absolute;
      top: 60px;
      width: 100%;
      text-align: center;
      z-index: 10;
      color: white;
      font-size: 18px;
      text-shadow: 1px 1px 4px rgba(0,0,0,0.4);
    }

    .confetti {
      position: absolute;
      top: -20px;
      width: 12px;
      height: 18px;
      opacity: 0.9;
      animation: confettiFall linear forwards;
      z-index: 1;
      border-radius: 2px;
    }

    @keyframes confettiFall {
      0% {
        transform: translateY(-10vh) rotate(0deg);
      }
      100% {
        transform: translateY(120vh) rotate(720deg);
      }
    }
  </style>
</head>
<body>
  <h1>Pincha los globos 🎈</h1>
  <div id="counter">Clicks: 0</div>
  <div id="gameArea"></div>

  <div id="overlay">
    <img id="popupImage" src="" alt="Foto sorpresa" style="display:none;">
    <div id="overlaySubMessage" style="display:none;"></div>
    <div id="overlayMessage" style="display:none;"></div>
    <button id="closeBtn">Seguir</button>
  </div>

  <script>
    const gameArea = document.getElementById("gameArea");
    const overlay = document.getElementById("overlay");
    const popupImage = document.getElementById("popupImage");
    const overlayMessage = document.getElementById("overlayMessage");
    const overlaySubMessage = document.getElementById("overlaySubMessage");
    const closeBtn = document.getElementById("closeBtn");
    const counter = document.getElementById("counter");

    let clickCount = 0;
    let gameFinished = false;
    let balloonInterval;

    const surpriseImages = [
      "foto1.jpg",
      "foto2.jpg",
      "foto3.jpg",
      "foto4.jpg"
    ];

    const surpriseTexts = [
      "Amazing! ✨",
      "YeeeaH! 😎",
      "Tasty! 😋"
    ];

    const balloonColors = [
      "#ff4d6d", "#ffb703", "#8338ec", "#3a86ff", "#06d6a0", "#fb5607"
    ];

    const confettiColors = [
      "#ff4d6d", "#ffb703", "#8338ec", "#3a86ff", "#06d6a0", "#ffffff", "#ff8fab"
    ];

    function createBalloon() {
      if (gameFinished) return;

      const balloon = document.createElement("div");
      balloon.classList.add("balloon");

      const size = Math.random() * 30 + 60;
      balloon.style.width = `${size}px`;
      balloon.style.height = `${size * 1.25}px`;
      balloon.style.left = `${Math.random() * (window.innerWidth - size)}px`;
      balloon.style.background = balloonColors[Math.floor(Math.random() * balloonColors.length)];
      balloon.style.animationDuration = `${Math.random() * 3 + 4}s`;

      balloon.addEventListener("click", () => handleBalloonClick(balloon));

      gameArea.appendChild(balloon);

      setTimeout(() => {
        balloon.remove();
      }, 8000);
    }

    function handleBalloonClick(balloon) {
      if (gameFinished) return;

      balloon.remove();
      clickCount++;
      counter.textContent = `Clicks: ${clickCount}`;

      if (clickCount >= 1 && clickCount <= 3) {
        showImage(surpriseImages[clickCount - 1], surpriseTexts[clickCount - 1]);
      } else if (clickCount === 4) {
        showFinalImage();
        gameFinished = true;
        clearInterval(balloonInterval);
        removeAllBalloons();
      }
    }

    function showImage(imageSrc, text) {
      popupImage.src = imageSrc;
      popupImage.style.display = "block";

      overlaySubMessage.textContent = text;
      overlaySubMessage.style.display = "block";

      overlayMessage.style.display = "none";
      closeBtn.style.display = "inline-block";
      overlay.style.display = "flex";
    }

    function showFinalImage() {
      popupImage.src = "foto4.jpg";
      popupImage.style.display = "block";

      overlaySubMessage.style.display = "none";

      overlayMessage.textContent = "Es una niña y se llama Carlota 👶💖🎀";
      overlayMessage.style.display = "block";

      closeBtn.style.display = "none";
      overlay.style.display = "flex";

      launchConfetti(120);
    }

    function launchConfetti(amount = 80) {
      for (let i = 0; i < amount; i++) {
        const confetti = document.createElement("div");
        confetti.classList.add("confetti");

        confetti.style.left = `${Math.random() * 100}%`;
        confetti.style.background = confettiColors[Math.floor(Math.random() * confettiColors.length)];
        confetti.style.width = `${Math.random() * 8 + 6}px`;
        confetti.style.height = `${Math.random() * 12 + 10}px`;
        confetti.style.animationDuration = `${Math.random() * 2 + 2}s`;
        confetti.style.animationDelay = `${Math.random() * 0.8}s`;

        overlay.appendChild(confetti);

        setTimeout(() => {
          confetti.remove();
        }, 4000);
      }
    }

    function removeAllBalloons() {
      document.querySelectorAll(".balloon").forEach(balloon => balloon.remove());
    }

    closeBtn.addEventListener("click", () => {
      overlay.style.display = "none";
    });

    balloonInterval = setInterval(createBalloon, 700);

    for (let i = 0; i < 6; i++) {
      setTimeout(createBalloon, i * 300);
    }
  </script>
</body>
</html>
